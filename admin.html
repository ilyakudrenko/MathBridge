<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Core School</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    .admin-container {
      min-height: 100vh;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      background: #fff;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .admin-header h1 {
      font-size: 2rem;
      color: #111;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .back-link, .logout-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }

    .back-link {
      background: #0077ff;
      color: #fff;
    }

    .back-link:hover {
      background: #005fcc;
    }

    .logout-btn {
      background: #ff3b30;
      color: #fff;
    }

    .logout-btn:hover {
      background: #d32f2f;
    }

    .admin-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      background: #fff;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .tab-btn {
      padding: 0.8rem 1.5rem;
      border: none;
      background: transparent;
      color: #555;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .tab-btn.active {
      background: #0077ff;
      color: #fff;
    }

    .tab-btn:hover {
      background: #f0f0f0;
    }

    .tab-btn.active:hover {
      background: #005fcc;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .section-card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .section-card h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #222;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #0077ff;
    }

    .btn-primary {
      background: #0077ff;
      color: #fff;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-primary:hover {
      background: #005fcc;
    }

    .btn-danger {
      background: #ff3b30;
      color: #fff;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    .btn-edit {
      background: #ff9800;
      color: #fff;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-right: 0.5rem;
    }

    .btn-edit:hover {
      background: #f57c00;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f7f9fb;
      font-weight: 600;
      color: #111;
    }

    tr:hover {
      background: #f9f9f9;
    }

    .tutor-image {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #555;
    }

    .actions-cell {
      display: flex;
      gap: 0.5rem;
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 1rem;
      }

      .admin-tabs {
        flex-wrap: wrap;
      }

      .table-container {
        overflow-x: scroll;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>Admin Panel</h1>
      <div class="header-actions">
        <a href="index.html" class="back-link">Back to Home</a>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="tutors">Manage Tutors</button>
      <button class="tab-btn" data-tab="users">Manage Users</button>
    </div>

    <!-- Tutors Tab -->
    <div id="tutorsTab" class="tab-content active">
      <div class="section-card">
        <h2>Add New Tutor</h2>
        <form id="addTutorForm">
          <div class="form-group">
            <label for="tutorName">Name *</label>
            <input type="text" id="tutorName" name="name" required />
          </div>
          <div class="form-group">
            <label for="tutorSubject">Subject</label>
            <input type="text" id="tutorSubject" name="subject" />
          </div>
          <div class="form-group">
            <label for="tutorBio">Bio</label>
            <textarea id="tutorBio" name="bio"></textarea>
          </div>
          <div class="form-group">
            <label for="tutorImage">Image URL</label>
            <input type="text" id="tutorImage" name="image" placeholder="img/tutor.jpg" />
          </div>
          <div class="form-group">
            <label for="tutorEmail">Email</label>
            <input type="email" id="tutorEmail" name="email" />
          </div>
          <div class="form-group">
            <label for="tutorPhone">Phone</label>
            <input type="tel" id="tutorPhone" name="phone" />
          </div>
          <button type="submit" class="btn-primary">Add Tutor</button>
        </form>
      </div>

      <div class="section-card">
        <h2>All Tutors</h2>
        <div class="loading" id="tutorsLoading">Loading tutors...</div>
        <div class="table-container" id="tutorsTableContainer" style="display: none;">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tutorsTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="usersTab" class="tab-content">
      <div class="section-card">
        <h2>All Users</h2>
        <div class="loading" id="usersLoading">Loading users...</div>
        <div class="table-container" id="usersTableContainer" style="display: none;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Email</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Phone</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check authentication and admin status
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token || !user.isAdmin) {
      window.location.href = 'login.html';
    }

    let tutors = [];
    let users = [];
    let editingTutorId = null;
    let editingUserId = null;

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        
        // Update buttons
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update content
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
      });
    });

    // Show message
    function showMessage(text, type = 'success') {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type} show`;
      setTimeout(() => {
        message.classList.remove('show');
      }, 3000);
    }

    // Load tutors
    async function loadTutors() {
      try {
        const response = await fetch('http://localhost:3000/api/admin/tutors', {
          headers: {
            'Authorization': `Bearer ${token}`,
          },
        });

        const data = await response.json();

        if (response.ok) {
          tutors = data.tutors || [];
          renderTutors();
        } else {
          showMessage(data.error || 'Error loading tutors', 'error');
        }
      } catch (error) {
        showMessage('Network error loading tutors', 'error');
      }
    }

    // Render tutors table
    function renderTutors() {
      const tbody = document.getElementById('tutorsTableBody');
      tbody.innerHTML = '';

      if (tutors.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No tutors found</td></tr>';
        return;
      }

      tutors.forEach(tutor => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>
            ${tutor.image ? `<img src="${tutor.image}" alt="${tutor.name}" class="tutor-image">` : '—'}
          </td>
          <td>${tutor.name}</td>
          <td>${tutor.subject || '—'}</td>
          <td>${tutor.email || '—'}</td>
          <td>${tutor.phone || '—'}</td>
          <td class="actions-cell">
            <button class="btn-edit" onclick="editTutor(${tutor.id})">Edit</button>
            <button class="btn-danger" onclick="deleteTutor(${tutor.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('tutorsLoading').style.display = 'none';
      document.getElementById('tutorsTableContainer').style.display = 'block';
    }

    // Add tutor
    document.getElementById('addTutorForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        name: document.getElementById('tutorName').value,
        subject: document.getElementById('tutorSubject').value || null,
        bio: document.getElementById('tutorBio').value || null,
        image: document.getElementById('tutorImage').value || null,
        email: document.getElementById('tutorEmail').value || null,
        phone: document.getElementById('tutorPhone').value || null,
      };

      const url = editingTutorId 
        ? `http://localhost:3000/api/admin/tutors/${editingTutorId}`
        : 'http://localhost:3000/api/admin/tutors';
      const method = editingTutorId ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method: method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(formData),
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(data.message || (editingTutorId ? 'Tutor updated successfully' : 'Tutor added successfully'));
          e.target.reset();
          editingTutorId = null;
          document.querySelector('.section-card h2').textContent = 'Add New Tutor';
          document.querySelector('#addTutorForm button').textContent = 'Add Tutor';
          loadTutors();
        } else {
          showMessage(data.error || 'Error saving tutor', 'error');
        }
      } catch (error) {
        showMessage('Network error', 'error');
      }
    });

    // Edit tutor
    window.editTutor = function(id) {
      const tutor = tutors.find(t => t.id === id);
      if (!tutor) return;

      document.getElementById('tutorName').value = tutor.name || '';
      document.getElementById('tutorSubject').value = tutor.subject || '';
      document.getElementById('tutorBio').value = tutor.bio || '';
      document.getElementById('tutorImage').value = tutor.image || '';
      document.getElementById('tutorEmail').value = tutor.email || '';
      document.getElementById('tutorPhone').value = tutor.phone || '';

      editingTutorId = id;
      document.querySelector('.section-card h2').textContent = 'Edit Tutor';
      document.querySelector('#addTutorForm button').textContent = 'Update Tutor';
      
      // Scroll to form
      document.querySelector('#addTutorForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

    // Delete tutor
    window.deleteTutor = async function(id) {
      if (!confirm('Are you sure you want to delete this tutor?')) return;

      try {
        const response = await fetch(`http://localhost:3000/api/admin/tutors/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`,
          },
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(data.message || 'Tutor deleted successfully');
          loadTutors();
        } else {
          showMessage(data.error || 'Error deleting tutor', 'error');
        }
      } catch (error) {
        showMessage('Network error', 'error');
      }
    };

    // Load users
    async function loadUsers() {
      try {
        const response = await fetch('http://localhost:3000/api/admin/users', {
          headers: {
            'Authorization': `Bearer ${token}`,
          },
        });

        const data = await response.json();

        if (response.ok) {
          users = data.users || [];
          renderUsers();
        } else {
          showMessage(data.error || 'Error loading users', 'error');
        }
      } catch (error) {
        showMessage('Network error loading users', 'error');
      }
    }

    // Render users table
    function renderUsers() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '';

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No users found</td></tr>';
        return;
      }

      users.forEach(user => {
        const row = document.createElement('tr');
        const createdAt = new Date(user.createdAt).toLocaleDateString();
        row.innerHTML = `
          <td>${user.id}</td>
          <td>${user.email}</td>
          <td>${user.firstName || '—'}</td>
          <td>${user.lastName || '—'}</td>
          <td>${user.phone || '—'}</td>
          <td>${createdAt}</td>
          <td class="actions-cell">
            <button class="btn-danger" onclick="deleteUser(${user.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('usersLoading').style.display = 'none';
      document.getElementById('usersTableContainer').style.display = 'block';
    }

    // Delete user
    window.deleteUser = async function(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;

      try {
        const response = await fetch(`http://localhost:3000/api/admin/users/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`,
          },
        });

        const data = await response.json();

        if (response.ok) {
          showMessage(data.message || 'User deleted successfully');
          loadUsers();
        } else {
          showMessage(data.error || 'Error deleting user', 'error');
        }
      } catch (error) {
        showMessage('Network error', 'error');
      }
    };

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    });

    // Load data on page load
    loadTutors();
    loadUsers();
  </script>
</body>
</html>
