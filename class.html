<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Details – Core School</title>
  <meta name="description" content="View class details and available tutors for Mathematics, Biology, AI, or Computer Science at Core School. Book 1-on-1 sessions with verified tutors." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .class-detail-container {
      min-height: 100vh;
      background: #f7f9fb;
      padding: 2rem;
    }

    .class-page .class-detail-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #0077ff;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #005fcc;
    }

    .class-header {
      margin-bottom: 2rem;
    }

    .class-name {
      font-size: 2.5rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 1.5rem;
    }

    .class-description-box {
      border: 2px solid #0077ff;
      border-radius: 12px;
      padding: 2rem;
      background: #fff;
      margin-bottom: 1.5rem;
      min-height: 150px;
    }

    .class-description {
      color: #444;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .class-price {
      font-size: 1.1rem;
      color: #444;
      margin-bottom: 3rem;
      line-height: 1.5;
    }
    .class-price a {
      color: #0077ff;
      font-weight: 600;
      text-decoration: none;
    }
    .class-price a:hover {
      text-decoration: underline;
    }

    .available-tutors-section {
      border: 2px solid #111;
      border-radius: 12px;
      padding: 2rem;
      background: #fff;
    }

    .available-tutors-header {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #111;
    }

    .tutor-sort-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .tutor-sort-label {
      font-size: 0.9rem;
      color: #555;
    }

    .tutor-sort-btn {
      padding: 0.4rem 0.9rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #444;
    }

    .tutor-sort-btn:hover {
      border-color: #0077ff;
      color: #0077ff;
    }

    .tutor-sort-btn.active {
      background: #0077ff;
      border-color: #0077ff;
      color: #fff;
    }

    .class-page .class-tutors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .tutor-card-detail {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      background: #f7f9fb;
      border-radius: 12px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .tutor-card-detail:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .tutor-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 1rem;
      border: 2px solid #ddd;
      overflow: hidden;
    }

    .tutor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .tutor-avatar-icon {
      font-size: 3rem;
      color: #999;
    }

    .tutor-heart {
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 1.2rem;
      color: #ff3b30;
    }

    .tutor-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .tutor-pitch {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.4;
      text-align: center;
      margin-bottom: 0.5rem;
      max-width: 220px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tutor-trust {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .tutor-trust .star {
      color: #f5a623;
      font-weight: 700;
    }

    .tutor-trust .rating-num {
      font-weight: 600;
      color: #111;
    }

    .tutor-experience {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .tutor-bio {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 1rem;
      max-width: 200px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .enroll-btn {
      background: transparent;
      color: #0077ff;
      border: 2px solid #0077ff;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
      text-align: center;
      width: 100%;
    }

    .enroll-btn:hover {
      background: #0077ff;
      color: #fff;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #555;
    }

    @media (max-width: 768px) {
      .class-name {
        font-size: 2rem;
      }
      .tutors-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="class-page">
  <div class="class-detail-container">
    <div class="class-detail-content">
      <a href="index.html#disciplines" class="back-link">← Back to Classes</a>

      <div id="loading" class="loading">Loading class information...</div>

      <div id="classContent" style="display: none;">
        <div class="class-header">
          <h1 class="class-name" id="className">Class Name</h1>

          <div class="class-description-box">
            <p class="class-description" id="classDescription">description...</p>
          </div>

          <div class="class-price" id="classPrice">Sessions are paid in <strong>credits</strong> (per session length). <a href="credits.html">View pricing &amp; credit packs</a></div>
        </div>

        <div class="available-tutors-section">
          <h2 class="available-tutors-header">Available Tutors</h2>
          <div class="tutor-sort-bar">
            <span class="tutor-sort-label">Sort by:</span>
            <button type="button" class="tutor-sort-btn active" data-sort="rating">Rating</button>
            <button type="button" class="tutor-sort-btn" data-sort="newest">Newest</button>
          </div>
          <div class="class-tutors-grid" id="tutorsGrid">
            <!-- Tutor cards will be inserted here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Class data (static info only: name/description/price)
    const classesData = {
      mathematics: {
        name: "Mathematics",
        description:
          "Master algebra, calculus, geometry, and more with personalized tutoring sessions tailored to your learning style. Our comprehensive math program covers everything from basic arithmetic to advanced calculus, ensuring you build a strong foundation and excel in your studies.",
        price: "$50/session",
      },
      biology: {
        name: "Biology",
        description:
          "Dive deep into cellular biology, genetics, ecology, and anatomy with expert guidance and interactive learning. Our biology program helps you understand the living world through hands-on experiments, detailed explanations, and real-world applications.",
        price: "$50/session",
      },
      ai: {
        name: "Artificial Intelligence",
        description:
          "Learn machine learning, neural networks, and AI fundamentals with hands-on projects and real-world applications. Our AI program covers everything from basic concepts to advanced techniques, preparing you for a career in this cutting-edge field.",
        price: "$60/session",
      },
      "computer-science": {
        name: "Computer Science",
        description:
          "Build programming skills, understand algorithms, data structures, and software engineering principles. Our comprehensive CS program covers multiple programming languages, software development practices, and computer science fundamentals.",
        price: "$55/session",
      },
    };

    // Get class parameter from URL
    const urlParams = new URLSearchParams(window.location.search);
    const classId = urlParams.get("class") || "mathematics";

    // Map classId → tutor.subjects values stored in DB
    const subjectKeyByClassId = {
      mathematics: "math",
      biology: "biology",
      ai: "ai",
      "computer-science": "computer-science",
    };

    const subjectKey = subjectKeyByClassId[classId] || classId;

    let allTutors = [];
    let currentSort = "rating";

    function sortTutors(tutors, sortBy) {
      const list = [...(tutors || [])];
      if (sortBy === "rating") {
        list.sort((a, b) => (Number(b.rating) || 0) - (Number(a.rating) || 0));
      } else {
        list.sort((a, b) => (b.id || 0) - (a.id || 0));
      }
      return list;
    }

    function renderTutors(tutors) {
      const tutorsGrid = document.getElementById("tutorsGrid");
      tutorsGrid.innerHTML = "";

      if (!tutors || tutors.length === 0) {
        tutorsGrid.innerHTML =
          '<p style="text-align:center; grid-column: 1 / -1;">No tutors available for this class yet.</p>';
        return;
      }

      tutors.forEach((tutor) => {
        const tutorCard = document.createElement("div");
        tutorCard.className = "tutor-card-detail";

        const hasImage = tutor.image && tutor.image !== "";
        const avatarContent = hasImage
          ? `<img src="${tutor.image}" alt="${tutor.name}">`
          : `<span class="tutor-avatar-icon">👤</span>`;

        const pitchText = tutor.pitch || (tutor.bio ? tutor.bio.split('.')[0] + '.' : 'Experienced tutor');

        let trustHtml = '';
        if (tutor.rating !== null && tutor.rating !== undefined) {
          trustHtml = `<div class="tutor-trust">
            <span class="star">★</span>
            <span class="rating-num">${Number(tutor.rating).toFixed(1)}</span>
            · ${tutor.review_count || 0} reviews
          </div>`;
        } else {
          trustHtml = `<div class="tutor-trust">No reviews yet</div>`;
        }

        const expParts = [];
        if (tutor.students_count > 0) expParts.push(`${tutor.students_count} students`);
        if (tutor.lessons_count > 0) expParts.push(`${tutor.lessons_count} sessions`);
        const expHtml = expParts.length
          ? `<div class="tutor-experience">${expParts.join(' · ')}</div>`
          : '';

        tutorCard.innerHTML = `
          <div class="tutor-avatar">
            ${avatarContent}
          </div>
          <div class="tutor-name">${tutor.name}</div>
          <div class="tutor-pitch">${pitchText}</div>
          ${trustHtml}
          ${expHtml}
          <a href="schedule.html?tutorId=${encodeURIComponent(tutor.id)}&class=${encodeURIComponent(classId)}" class="enroll-btn">
            Enroll</a>
        `;

        tutorsGrid.appendChild(tutorCard);
      });
    }

    function applySortAndRender() {
      const sorted = sortTutors(allTutors, currentSort);
      renderTutors(sorted);
    }

    async function loadTutorsForClass() {
      try {
        const res = await fetch(`/api/tutors?subject=${encodeURIComponent(subjectKey)}`);
        const data = await res.json();
        allTutors = data.tutors || [];
        applySortAndRender();
      } catch (err) {
        allTutors = [];
        renderTutors([]);
      }
    }

    function loadClassData() {
      const classData = classesData[classId];

      if (!classData) {
        document.getElementById("loading").textContent = "Class not found.";
        return;
      }

      // Update class info (price block is static: credits + link to credits.html)
      document.getElementById("className").textContent = classData.name;
      document.getElementById("classDescription").textContent = classData.description;

      // Show content
      document.getElementById("loading").style.display = "none";
      document.getElementById("classContent").style.display = "block";
    }

    // Load on page load
    loadClassData();
    loadTutorsForClass();

    // Sort by buttons
    document.querySelectorAll(".tutor-sort-btn").forEach((btn) => {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".tutor-sort-btn").forEach((b) => b.classList.remove("active"));
        this.classList.add("active");
        currentSort = this.getAttribute("data-sort") || "rating";
        applySortAndRender();
      });
    });

    // ===== ENROLL AUTH CHECK =====
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".enroll-btn-auth");
  if (!btn) return;

  const token = localStorage.getItem("token");

  if (token) {
    // user logged in → go to schedule
    window.location.href = "schedule.html";
  } else {
    // not logged in → go to login
    window.location.href = "login.html";
  }
});
  </script>
</body>
</html>
