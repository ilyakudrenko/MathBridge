<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Details – Core School</title>
  <meta name="description" content="View class details and available tutors for Mathematics, Biology, AI, or Computer Science at Core School. Book 1-on-1 sessions with verified tutors." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .class-detail-container {
      min-height: 100vh;
      background: linear-gradient(180deg, #eef2f9 0%, #f7f9fb 35%, #f0f4fa 100%);
      padding: 2rem 1.25rem 3rem;
    }

    .class-page .class-detail-content {
      max-width: 1100px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #0077ff;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 1.75rem;
      font-size: 0.98rem;
    }
    .back-link:hover { color: #005fcc; }

    .class-header { margin-bottom: 1.75rem; }

    .class-name {
      font-size: clamp(1.85rem, 4vw, 2.6rem);
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 1.25rem;
      letter-spacing: -0.03em;
    }

    .class-description-box {
      border: 1px solid rgba(0, 119, 255, 0.35);
      border-radius: 20px;
      padding: 1.75rem 2rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.06);
      margin-bottom: 1.25rem;
    }

    .class-description {
      color: #475569;
      font-size: 1.05rem;
      line-height: 1.75;
      margin: 0;
    }

    .class-price {
      font-size: 1.02rem;
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.55;
    }
    .class-price a {
      color: #0077ff;
      font-weight: 600;
      text-decoration: none;
    }
    .class-price a:hover { text-decoration: underline; }

    .available-tutors-section {
      border: 1px solid rgba(0, 119, 255, 0.2);
      border-radius: 24px;
      padding: 2rem 1.75rem 2.25rem;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.07);
    }

    .tutors-section-head {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .available-tutors-kicker {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0077ff;
      margin-bottom: 0.35rem;
    }

    .available-tutors-header {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }

    .available-tutors-sub {
      font-size: 0.95rem;
      color: #64748b;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .tutor-sort-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-bottom: 1.75rem;
    }

    .tutor-sort-label {
      font-size: 0.9rem;
      color: #64748b;
      font-weight: 600;
    }

    .tutor-sort-btn {
      padding: 0.5rem 1.15rem;
      border: 1px solid #e2e8f0;
      background: #fff;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
      transition: all 0.2s;
    }

    .tutor-sort-btn:hover {
      border-color: #0077ff;
      color: #0077ff;
    }

    .tutor-sort-btn.active {
      background: #0077ff;
      border-color: #0077ff;
      color: #fff;
      box-shadow: 0 4px 14px rgba(0, 119, 255, 0.28);
    }

    .class-page .class-tutors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.35rem;
    }

    .tutor-card-detail {
      display: flex;
      flex-direction: column;
      padding: 0;
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e8ecf2;
      overflow: hidden;
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.2s;
    }

    .tutor-card-detail:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.1);
      border-color: rgba(0, 119, 255, 0.25);
    }

    .tutor-card-row {
      display: flex;
      gap: 1.1rem;
      padding: 1.35rem 1.35rem 0;
      align-items: flex-start;
    }

    .tutor-avatar {
      width: 72px;
      height: 72px;
      min-width: 72px;
      border-radius: 50%;
      background: linear-gradient(145deg, #e8f0ff, #f1f5f9);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      flex-shrink: 0;
    }

    .tutor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tutor-avatar-initials {
      font-size: 1.35rem;
      font-weight: 800;
      color: #0077ff;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .tutor-avatar-icon {
      font-size: 2rem;
      opacity: 0.45;
    }

    .tutor-card-body {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .tutor-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 0.35rem;
      line-height: 1.25;
      word-break: break-word;
    }

    .tutor-pitch {
      font-size: 0.88rem;
      color: #64748b;
      line-height: 1.45;
      margin: 0 0 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tutor-trust {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 0.25rem;
    }

    .tutor-trust .star {
      color: #f5a623;
      font-weight: 700;
    }

    .tutor-trust .rating-num {
      font-weight: 700;
      color: #334155;
    }

    .tutor-experience {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 0;
    }

    .tutor-card-footer {
      padding: 1rem 1.35rem 1.35rem;
      margin-top: auto;
    }

    .enroll-btn {
      background: #0077ff;
      color: #fff;
      border: none;
      padding: 0.85rem 1.25rem;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(0, 119, 255, 0.28);
    }

    .enroll-btn:hover {
      background: #0066dd;
      box-shadow: 0 6px 22px rgba(0, 119, 255, 0.35);
      transform: translateY(-1px);
      color: #fff;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }

    @media (max-width: 768px) {
      .class-page .class-tutors-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="class-page">
  <div class="class-detail-container">
    <div class="class-detail-content">
      <a href="index.html#disciplines" class="back-link">← Back to Classes</a>

      <div id="loading" class="loading">Loading class information...</div>

      <div id="classContent" style="display: none;">
        <div class="class-header">
          <h1 class="class-name" id="className">Class Name</h1>

          <div class="class-description-box">
            <p class="class-description" id="classDescription">description...</p>
          </div>

          <div class="class-price" id="classPrice">Sessions are paid in <strong>credits</strong> (per session length). <a href="credits.html">View pricing &amp; credit packs</a></div>
        </div>

        <div class="available-tutors-section">
          <div class="tutors-section-head">
            <p class="available-tutors-kicker">Choose your guide</p>
            <h2 class="available-tutors-header">Available tutors</h2>
            <p class="available-tutors-sub">Compare experience and ratings, then book a session that fits your schedule.</p>
          </div>
          <div class="tutor-sort-bar">
            <span class="tutor-sort-label">Sort by:</span>
            <button type="button" class="tutor-sort-btn active" data-sort="rating">Rating</button>
            <button type="button" class="tutor-sort-btn" data-sort="newest">Newest</button>
          </div>
          <div class="class-tutors-grid" id="tutorsGrid">
            <!-- Tutor cards will be inserted here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Class data (static info only: name/description/price)
    const classesData = {
      mathematics: {
        name: "Mathematics",
        description:
          "Master algebra, calculus, geometry, and more with personalized tutoring sessions tailored to your learning style. Our comprehensive math program covers everything from basic arithmetic to advanced calculus, ensuring you build a strong foundation and excel in your studies.",
        price: "$50/session",
      },
      biology: {
        name: "Biology",
        description:
          "Dive deep into cellular biology, genetics, ecology, and anatomy with expert guidance and interactive learning. Our biology program helps you understand the living world through hands-on experiments, detailed explanations, and real-world applications.",
        price: "$50/session",
      },
      ai: {
        name: "Artificial Intelligence",
        description:
          "Learn machine learning, neural networks, and AI fundamentals with hands-on projects and real-world applications. Our AI program covers everything from basic concepts to advanced techniques, preparing you for a career in this cutting-edge field.",
        price: "$60/session",
      },
      "computer-science": {
        name: "Computer Science",
        description:
          "Build programming skills, understand algorithms, data structures, and software engineering principles. Our comprehensive CS program covers multiple programming languages, software development practices, and computer science fundamentals.",
        price: "$55/session",
      },
    };

    // Get class parameter from URL
    const urlParams = new URLSearchParams(window.location.search);
    const classId = urlParams.get("class") || "mathematics";

    // Map classId → tutor.subjects values stored in DB
    const subjectKeyByClassId = {
      mathematics: "mathematics",
      biology: "biology",
      ai: "ai",
      "computer-science": "computer-science",
    };

    const subjectKey = subjectKeyByClassId[classId] || classId;

    let allTutors = [];
    let currentSort = "rating";

    function sortTutors(tutors, sortBy) {
      const list = [...(tutors || [])];
      if (sortBy === "rating") {
        list.sort((a, b) => (Number(b.rating) || 0) - (Number(a.rating) || 0));
      } else {
        list.sort((a, b) => (b.id || 0) - (a.id || 0));
      }
      return list;
    }

    function tutorInitials(name) {
      const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
      const a = (parts[0] && parts[0][0]) || "";
      const b = (parts[1] && parts[1][0]) || "";
      return (a + b).toUpperCase() || "?";
    }

    function escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/"/g, "&quot;");
    }

    function renderTutors(tutors) {
      const tutorsGrid = document.getElementById("tutorsGrid");
      tutorsGrid.innerHTML = "";

      if (!tutors || tutors.length === 0) {
        tutorsGrid.innerHTML =
          '<p style="text-align:center; grid-column: 1 / -1; color:#64748b; padding:2rem;">No tutors available for this class yet. Check back soon or explore another subject.</p>';
        return;
      }

      tutors.forEach((tutor) => {
        const tutorCard = document.createElement("div");
        tutorCard.className = "tutor-card-detail";

        const rawName = tutor.name || "Tutor";
        const safeName = escapeHtml(rawName);
        const initials = tutorInitials(rawName);
        const hasImage = tutor.image && String(tutor.image).trim() !== "";

        const imgSrc = String(tutor.image).replace(/"/g, '&quot;');
        const avatarInner = hasImage
          ? `<img src="${imgSrc}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <span class="tutor-avatar-initials" style="display:none;">${escapeHtml(initials)}</span>`
          : `<span class="tutor-avatar-initials">${escapeHtml(initials)}</span>`;

        const pitchRaw = tutor.pitch || (tutor.bio ? String(tutor.bio).split(/[.!?]/)[0] + "." : "Experienced tutor ready to help you reach your goals.");
        const pitchText = escapeHtml(pitchRaw.trim());

        let trustHtml = "";
        if (tutor.rating !== null && tutor.rating !== undefined) {
          trustHtml = `<div class="tutor-trust">
            <span class="star">★</span>
            <span class="rating-num">${Number(tutor.rating).toFixed(1)}</span>
            · ${tutor.review_count || 0} review${(tutor.review_count || 0) === 1 ? "" : "s"}
          </div>`;
        } else {
          trustHtml = `<div class="tutor-trust">No reviews yet — be the first to book.</div>`;
        }

        const expParts = [];
        if (tutor.students_count > 0) expParts.push(`${tutor.students_count} students`);
        if (tutor.lessons_count > 0) expParts.push(`${tutor.lessons_count} sessions`);
        const expHtml = expParts.length
          ? `<div class="tutor-experience">${expParts.join(" · ")}</div>`
          : "";

        tutorCard.innerHTML = `
          <div class="tutor-card-row">
            <div class="tutor-avatar">${avatarInner}</div>
            <div class="tutor-card-body">
              <div class="tutor-name">${safeName}</div>
              <div class="tutor-pitch">${pitchText}</div>
              ${trustHtml}
              ${expHtml}
            </div>
          </div>
          <div class="tutor-card-footer">
            <a href="schedule.html?tutorId=${encodeURIComponent(tutor.id)}&class=${encodeURIComponent(classId)}" class="enroll-btn">
              Book with this tutor
            </a>
          </div>
        `;

        tutorsGrid.appendChild(tutorCard);
      });
    }

    function applySortAndRender() {
      const sorted = sortTutors(allTutors, currentSort);
      renderTutors(sorted);
    }

    async function loadTutorsForClass() {
      try {
        const res = await fetch(`/api/tutors?subject=${encodeURIComponent(subjectKey)}`);
        const data = await res.json();
        allTutors = data.tutors || [];
        applySortAndRender();
      } catch (err) {
        allTutors = [];
        renderTutors([]);
      }
    }

    function loadClassData() {
      const classData = classesData[classId];

      if (!classData) {
        document.getElementById("loading").textContent = "Class not found.";
        return;
      }

      // Update class info (price block is static: credits + link to credits.html)
      document.getElementById("className").textContent = classData.name;
      document.getElementById("classDescription").textContent = classData.description;

      // Show content
      document.getElementById("loading").style.display = "none";
      document.getElementById("classContent").style.display = "block";
    }

    // Load on page load
    loadClassData();
    loadTutorsForClass();

    // Sort by buttons
    document.querySelectorAll(".tutor-sort-btn").forEach((btn) => {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".tutor-sort-btn").forEach((b) => b.classList.remove("active"));
        this.classList.add("active");
        currentSort = this.getAttribute("data-sort") || "rating";
        applySortAndRender();
      });
    });

    // ===== ENROLL AUTH CHECK =====
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".enroll-btn-auth");
  if (!btn) return;

  const token = localStorage.getItem("token");

  if (token) {
    // user logged in → go to schedule
    window.location.href = "schedule.html";
  } else {
    // not logged in → go to login
    window.location.href = "login.html";
  }
});
  </script>
</body>
</html>
