<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password – Core School</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth-shared.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right, #f7f9fb, #e9eef4);
      padding: 2rem;
    }
    .auth-card { background: #fff; }
    .msg { padding: 0.85rem 1rem; border-radius: 14px; margin-bottom: 1rem; display: none; font-size: 0.95rem; }
    .msg.show { display: block; }
    .msg.error { background: #fee; color: #c33; }
    .msg.success { background: #e8f8ee; color: #1b6b3a; border: 1px solid rgba(52, 199, 89, 0.25); }
    .back-home {
      position: absolute; top: 2rem; left: 2rem;
      color: #0077ff; text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .back-home:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container auth-surface">
    <a href="login.html" class="back-home">← Back to login</a>
    <div class="auth-card">
      <h2>Reset password</h2>
      <p class="subtitle">Enter the email you used for Core School. If it’s registered, we’ll send a reset link.</p>

      <div class="msg error" id="errorMessage"></div>
      <div class="msg success" id="successMessage"></div>

      <form class="auth-form" id="form">
        <input type="email" id="email" required autocomplete="email" placeholder="Your email address" />
        <button type="submit" class="auth-btn" id="btn">Send reset link</button>
      </form>

      <div class="auth-links">
        <p><a href="login.html">Return to login</a></p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const err = document.getElementById('errorMessage');
    const ok = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      ok.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
        });
        const data = await res.json();
        if (res.ok) {
          ok.textContent = data.message || 'Check your inbox for reset instructions.';
          ok.classList.add('show');
        } else {
          err.textContent = data.error || 'Something went wrong';
          err.classList.add('show');
        }
      } catch {
        err.textContent = 'Network error. Try again.';
        err.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
