<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credits &amp; pricing – Core School</title>
  <meta name="description" content="Buy credit packs for Core School tutoring sessions. Transparent pricing, no hidden fees. View your balance and transaction history." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; min-height: 100vh; }

    .credits-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .credits-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem; background: #fff; padding: 1.5rem 2rem;
      border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .credits-header h1 { font-size: 1.8rem; color: #111; }
    .credits-header-links { display: flex; gap: 1rem; align-items: center; }
    .credits-header-links a {
      color: #0077ff; text-decoration: none; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 8px; transition: background 0.2s;
    }
    .credits-header-links a:hover { background: #f0f4ff; }

    .balance-banner {
      background: linear-gradient(135deg, #0077ff, #00c6ff);
      color: #fff; border-radius: 16px; padding: 2rem;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem; box-shadow: 0 8px 24px rgba(0,119,255,0.2);
    }
    .balance-info h2 { font-size: 0.95rem; font-weight: 500; opacity: 0.9; margin-bottom: 0.3rem; }
    .balance-amount { font-size: 3rem; font-weight: 800; line-height: 1; }
    .balance-held { font-size: 0.9rem; opacity: 0.85; margin-top: 0.4rem; }

    .success-banner {
      background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
      padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 2rem;
      font-weight: 600; display: none; text-align: center;
    }
    .success-banner.visible { display: block; }

    .section-title {
      font-size: 1.4rem; font-weight: 700; color: #111;
      margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;
    }

    .packs-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem; margin-bottom: 3rem;
    }

    .pack-card {
      background: #fff; border: 2px solid #e8ecf1; border-radius: 16px;
      padding: 1.8rem; text-align: center; transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .pack-card:hover {
      border-color: #0077ff; transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,119,255,0.12);
    }
    .pack-card.featured {
      border-color: #0077ff; background: linear-gradient(180deg, #f0f7ff 0%, #fff 40%);
    }
    .pack-card.featured::before {
      content: 'Best Value'; position: absolute; top: 12px; right: -28px;
      background: #0077ff; color: #fff; font-size: 0.7rem; font-weight: 700;
      padding: 0.25rem 2rem; transform: rotate(45deg);
    }

    .pack-name { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 0.5rem; }
    .pack-credits { font-size: 2.4rem; font-weight: 800; color: #0077ff; line-height: 1; }
    .pack-credits-label { font-size: 0.85rem; color: #888; margin-bottom: 0.75rem; }
    .pack-price { font-size: 1.5rem; font-weight: 700; color: #111; margin-bottom: 0.2rem; }
    .pack-savings {
      font-size: 0.82rem; color: #22c55e; font-weight: 600;
      margin-bottom: 1rem; min-height: 1.2rem;
    }
    .pack-bonus {
      display: inline-block; background: #fff3cd; color: #856404;
      font-size: 0.78rem; font-weight: 600; padding: 0.25rem 0.75rem;
      border-radius: 999px; margin-bottom: 0.75rem;
    }

    .pack-buy-btn {
      width: 100%; padding: 0.75rem; border: none; border-radius: 10px;
      background: #0077ff; color: #fff; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s;
    }
    .pack-buy-btn:hover { background: #005fcc; }
    .pack-buy-btn:disabled { background: #ccc; cursor: not-allowed; }

    .ledger-section {
      background: #fff; border-radius: 16px; padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ledger-table { width: 100%; border-collapse: collapse; }
    .ledger-table th, .ledger-table td {
      padding: 0.8rem 1rem; text-align: left; border-bottom: 1px solid #f0f0f0;
    }
    .ledger-table th { font-size: 0.82rem; color: #888; text-transform: uppercase; font-weight: 600; }
    .ledger-table td { font-size: 0.92rem; color: #333; }
    .ledger-amount { font-weight: 700; }
    .ledger-amount.positive { color: #22c55e; }
    .ledger-amount.negative { color: #ef4444; }
    .ledger-type {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 6px;
      font-size: 0.78rem; font-weight: 600;
    }
    .ledger-type.purchase { background: #d4edda; color: #155724; }
    .ledger-type.hold { background: #fff3cd; color: #856404; }
    .ledger-type.debit { background: #f8d7da; color: #721c24; }
    .ledger-type.refund { background: #cce5ff; color: #004085; }
    .ledger-type.adjustment { background: #e2e3e5; color: #383d41; }
    .ledger-type.bonus { background: #d4edda; color: #155724; }

    .ledger-empty { text-align: center; color: #999; padding: 2rem; }

    .load-more-btn {
      display: block; margin: 1.5rem auto 0; padding: 0.6rem 2rem;
      border: 1.5px solid #0077ff; border-radius: 8px; background: #fff;
      color: #0077ff; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .load-more-btn:hover { background: #f0f7ff; }

    @media (max-width: 768px) {
      .credits-header { flex-direction: column; gap: 1rem; }
      .balance-banner { flex-direction: column; text-align: center; gap: 1rem; }
      .packs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="credits-page">
    <div class="credits-header">
      <h1>Credits</h1>
      <div class="credits-header-links">
        <a href="profile.html">My Profile</a>
        <a href="index.html">Home</a>
      </div>
    </div>

    <div class="success-banner" id="successBanner">
      Purchase successful! Your credits have been added to your account.
    </div>

    <div class="balance-banner">
      <div class="balance-info">
        <h2>Available Balance</h2>
        <div class="balance-amount" id="balanceAmount">—</div>
        <div class="balance-held" id="balanceHeld"></div>
      </div>
    </div>

    <div class="section-title">Buy Credit Packs</div>
    <div class="packs-grid" id="packsGrid">
      <div style="text-align:center;color:#999;padding:2rem;">Loading packs...</div>
    </div>

    <div class="ledger-section">
      <div class="section-title">Transaction History</div>
      <table class="ledger-table" id="ledgerTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="ledgerBody">
          <tr><td colspan="4" class="ledger-empty">Loading...</td></tr>
        </tbody>
      </table>
      <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load More</button>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'login.html'; }

    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === '1') {
      document.getElementById('successBanner').classList.add('visible');
      window.history.replaceState({}, '', 'credits.html');
    }

    let ledgerOffset = 0;
    const LEDGER_LIMIT = 20;

    async function loadBalance() {
      try {
        const res = await fetch('/api/credits/balance', {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('balanceAmount').textContent = `${data.available} credits`;
          const heldEl = document.getElementById('balanceHeld');
          if (data.held > 0) {
            heldEl.textContent = `${data.held} credits reserved for upcoming lessons`;
          } else {
            heldEl.textContent = '';
          }
        }
      } catch (e) {
        console.error('Balance load error:', e);
      }
    }

    async function loadPacks() {
      try {
        const res = await fetch('/api/credits/packs');
        const data = await res.json();
        if (!res.ok) return;

        const grid = document.getElementById('packsGrid');
        grid.innerHTML = '';
        const packs = data.packs || [];

        packs.forEach((pack, i) => {
          const perCredit = pack.price_usd / pack.credits;
          const baseRate = packs[0] ? packs[0].price_usd / packs[0].credits : perCredit;
          const savingsPercent = Math.round((1 - perCredit / baseRate) * 100);
          const isFeatured = i === packs.length - 1;

          const card = document.createElement('div');
          card.className = `pack-card${isFeatured ? ' featured' : ''}`;

          let bonusHtml = '';
          if (pack.bonus_credits > 0) {
            bonusHtml = `<div class="pack-bonus">+${pack.bonus_credits} bonus credits</div>`;
          }

          card.innerHTML = `
            <div class="pack-name">${pack.name}</div>
            <div class="pack-credits">${pack.credits}</div>
            <div class="pack-credits-label">credits</div>
            ${bonusHtml}
            <div class="pack-price">$${pack.price_usd}</div>
            <div class="pack-savings">${savingsPercent > 0 ? `Save ${savingsPercent}%` : ''}</div>
            <button class="pack-buy-btn" data-pack-id="${pack.id}">Buy Now</button>
          `;
          grid.appendChild(card);
        });

        grid.querySelectorAll('.pack-buy-btn').forEach(btn => {
          btn.addEventListener('click', () => purchasePack(btn.dataset.packId, btn));
        });
      } catch (e) {
        console.error('Packs load error:', e);
      }
    }

    async function purchasePack(packId, btn) {
      btn.disabled = true;
      btn.textContent = 'Redirecting...';
      try {
        const res = await fetch('/api/credits/purchase', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({ packId: Number(packId) }),
        });
        const data = await res.json();
        if (res.ok && data.url) {
          window.location.href = data.url;
        } else {
          alert(data.error || 'Purchase failed');
          btn.disabled = false;
          btn.textContent = 'Buy Now';
        }
      } catch (e) {
        alert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Buy Now';
      }
    }

    function typeLabel(type) {
      const map = {
        PURCHASE_ISSUE: 'Purchase',
        BONUS: 'Bonus',
        ADJUSTMENT: 'Adjustment',
        HOLD_CREATE: 'Hold',
        HOLD_RELEASE: 'Refund',
        DEBIT_FINAL: 'Charged',
        REFUND: 'Refund',
      };
      return map[type] || type;
    }
    function typeClass(type) {
      if (type === 'PURCHASE_ISSUE' || type === 'BONUS') return 'purchase';
      if (type === 'HOLD_CREATE') return 'hold';
      if (type === 'DEBIT_FINAL') return 'debit';
      if (type === 'HOLD_RELEASE' || type === 'REFUND') return 'refund';
      if (type === 'ADJUSTMENT') return 'adjustment';
      return '';
    }

    async function loadLedger(append) {
      try {
        const res = await fetch(`/api/credits/ledger?limit=${LEDGER_LIMIT}&offset=${ledgerOffset}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) return;

        const body = document.getElementById('ledgerBody');
        if (!append) body.innerHTML = '';

        const entries = data.ledger || [];
        if (entries.length === 0 && !append) {
          body.innerHTML = '<tr><td colspan="4" class="ledger-empty">No transactions yet. Purchase a credit pack to get started.</td></tr>';
          return;
        }

        entries.forEach(entry => {
          let details = '';
          if (entry.metadata) {
            try {
              const meta = JSON.parse(entry.metadata);
              details = meta.pack || meta.class || meta.reason || meta.action || '';
            } catch {}
          }
          const row = document.createElement('tr');
          const date = new Date(entry.createdAt).toLocaleDateString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const sign = entry.amount > 0 ? '+' : '';
          const amtClass = entry.amount >= 0 ? 'positive' : 'negative';

          row.innerHTML = `
            <td>${date}</td>
            <td><span class="ledger-type ${typeClass(entry.type)}">${typeLabel(entry.type)}</span></td>
            <td><span class="ledger-amount ${amtClass}">${sign}${entry.amount}</span></td>
            <td>${details}</td>
          `;
          body.appendChild(row);
        });

        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (entries.length >= LEDGER_LIMIT) {
          ledgerOffset += LEDGER_LIMIT;
          loadMoreBtn.style.display = 'block';
        } else {
          loadMoreBtn.style.display = 'none';
        }
      } catch (e) {
        console.error('Ledger load error:', e);
      }
    }

    document.getElementById('loadMoreBtn').addEventListener('click', () => loadLedger(true));

    loadBalance();
    loadPacks();
    loadLedger(false);
  </script>
</body>
</html>
