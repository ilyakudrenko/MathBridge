<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Core School</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth-shared.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right, #f7f9fb, #e9eef4);
      padding: 2rem;
    }
    .auth-card {
      background: #fff;
    }
    .error-message {
      background: #fee;
      color: #c33;
      padding: 0.85rem 1rem;
      border-radius: 14px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.95rem;
    }
    .error-message.show {
      display: block;
    }
    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: #0077ff;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .back-home:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-container auth-surface">
    <a href="index.html" class="back-home">← Back to Home</a>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your Core School account</p>

      <div class="error-message" id="errorMessage"></div>

      <form class="auth-form" id="loginForm">
        <div>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="Enter your email" />
        </div>
        <div>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password" />
        </div>
        <div class="forgot-row">
          <a href="forgot-password.html">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">Log in</button>
      </form>

      <div class="auth-links">
        <p>Don’t have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'profile.html';
    }

    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      errorMessage.classList.remove('show');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          if (data.user.isAdmin) {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'profile.html';
          }
        } else {
          errorMessage.textContent = data.error || 'Login failed';
          errorMessage.classList.add('show');
        }
      } catch (error) {
        errorMessage.textContent = 'Network error. Please try again.';
        errorMessage.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
