<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MathBridge Tutoring</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right, #f7f9fb, #e9eef4);
      padding: 2rem;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 450px;
      width: 100%;
    }
    .auth-card h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #111;
      text-align: center;
    }
    .auth-card p {
      text-align: center;
      color: #555;
      margin-bottom: 2rem;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .auth-form label {
      font-weight: 600;
      color: #222;
      font-size: 0.95rem;
    }
    .auth-form input {
      padding: 0.9rem 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .auth-form input:focus {
      border-color: #0077ff;
      outline: none;
    }
    .auth-btn {
      background: #0077ff;
      color: #fff;
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 0.5rem;
    }
    .auth-btn:hover {
      background: #005fcc;
    }
    .auth-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error-message {
      background: #fee;
      color: #c33;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .auth-links {
      text-align: center;
      margin-top: 1.5rem;
      color: #555;
    }
    .auth-links a {
      color: #0077ff;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: #0077ff;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .back-home:hover {
      text-decoration: underline;
    }

    .auth-form input {
      width: 100%;
    }

    .auth-form label {
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <a href="index.html" class="back-home">← Back to Home</a>
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p>Login to your MathBridge account</p>
      
      <div class="error-message" id="errorMessage"></div>
      
      <form class="auth-form" id="loginForm">
        <div>
          <!-- <label for="email">Email</label> -->
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="Enter your email"/>
        </div>
        <div>
          <!-- <label for="password">Password</label> -->
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password"/>
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">Login</button>
      </form>
      
      <div class="auth-links">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

  <script>
    // Check if user is already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'profile.html';
    }

    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      errorMessage.classList.remove('show');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          // Store token and user info
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // Redirect based on user role
          if (data.user.isAdmin) {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'profile.html';
          }
        } else {
          errorMessage.textContent = data.error || 'Login failed';
          errorMessage.classList.add('show');
        }
      } catch (error) {
        errorMessage.textContent = 'Network error. Please try again.';
        errorMessage.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
