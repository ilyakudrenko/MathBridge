<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set new password – Core School</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth-shared.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right, #f7f9fb, #e9eef4);
      padding: 2rem;
    }
    .auth-card { background: #fff; }
    .msg { padding: 0.85rem 1rem; border-radius: 14px; margin-bottom: 1rem; display: none; font-size: 0.95rem; }
    .msg.show { display: block; }
    .msg.error { background: #fee; color: #c33; }
    .msg.success { background: #e8f8ee; color: #1b6b3a; border: 1px solid rgba(52, 199, 89, 0.25); }
    .back-home {
      position: absolute; top: 2rem; left: 2rem;
      color: #0077ff; text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .back-home:hover { text-decoration: underline; }
    .hint { font-size: 0.85rem; color: #888; margin-top: -0.5rem; }
  </style>
</head>
<body>
  <div class="auth-container auth-surface">
    <a href="login.html" class="back-home">← Back to login</a>
    <div class="auth-card">
      <h2>New password</h2>
      <p class="subtitle">Choose a strong password for your account.</p>

      <div class="msg error" id="errorMessage"></div>
      <div class="msg success" id="successMessage"></div>

      <form class="auth-form" id="form">
        <input type="hidden" id="token" />
        <input type="password" id="password" required minlength="6" autocomplete="new-password" placeholder="New password (min 6 characters)" />
        <p class="hint">Use at least 6 characters. Mix letters, numbers, and symbols for better security.</p>
        <input type="password" id="password2" required minlength="6" autocomplete="new-password" placeholder="Confirm new password" />
        <button type="submit" class="auth-btn" id="btn">Update password</button>
      </form>

      <div class="auth-links">
        <p><a href="login.html">Back to login</a></p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    document.getElementById('token').value = token;

    if (!token) {
      document.getElementById('errorMessage').textContent = 'Invalid or missing reset link. Request a new one from the login page.';
      document.getElementById('errorMessage').classList.add('show');
      document.getElementById('form').style.display = 'none';
    }

    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const err = document.getElementById('errorMessage');
    const ok = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('show');
      ok.classList.remove('show');
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) {
        err.textContent = 'Passwords do not match.';
        err.classList.add('show');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: p1 }),
        });
        const data = await res.json();
        if (res.ok) {
          ok.textContent = data.message || 'Password updated.';
          ok.classList.add('show');
          form.style.display = 'none';
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
          err.textContent = data.error || 'Could not reset password';
          err.classList.add('show');
        }
      } catch {
        err.textContent = 'Network error. Try again.';
        err.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update password';
      }
    });
  </script>
</body>
</html>
